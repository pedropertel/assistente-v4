<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistente</title>

  <style>
    /* ============================================================
       DESIGN SYSTEM — CSS VARIABLES
       Tema escuro = default no :root
       Tema claro  = sobrescreve em html.light
       ============================================================ */

    :root {
      /* Backgrounds */
      --bg-primary:   #0F0F14;
      --bg-secondary: #1A1A22;
      --bg-tertiary:  #242430;

      /* Text */
      --text-primary:   #F5F5F7;
      --text-secondary: #A0A0B0;
      --text-tertiary:  #6B6B80;

      /* Accent (cor da marca, mantida do PWA antigo) */
      --accent:       #5B6AF0;
      --accent-hover: #7280F5;

      /* Bordas */
      --border: #2A2A38;

      /* Estados */
      --success: #22C55E;
      --warning: #F59E0B;
      --danger:  #EF4444;

      /* Raios */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;

      /* Espaçamentos */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;

      /* Sombras (sutis no dark) */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);

      /* Transição padrão */
      --transition: 0.2s ease;
    }

    html.light {
      --bg-primary:   #FFFFFF;
      --bg-secondary: #F5F5F7;
      --bg-tertiary:  #EDEDF0;

      --text-primary:   #1A1A22;
      --text-secondary: #5B5B6E;
      --text-tertiary:  #9999AA;

      --border: #E0E0E8;

      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
    }

    /* ============================================================
       RESET MÍNIMO
       ============================================================ */

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      padding: var(--space-4);
      transition: background var(--transition), color var(--transition);
    }

    /* ============================================================
       BOTÃO DE TEMA FLUTUANTE
       ============================================================ */

    #theme-toggle {
      position: fixed;
      top: var(--space-4);
      right: var(--space-4);
      z-index: 1001;
      width: 44px;
      height: 44px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        background var(--transition),
        color var(--transition),
        border-color var(--transition),
        box-shadow var(--transition);
    }

    #theme-toggle:hover {
      background: var(--bg-tertiary);
      box-shadow: var(--shadow-md);
    }

    #theme-toggle:focus-visible {
      border-color: var(--accent);
    }

    /* ============================================================
       TELA DE LOGIN
       Overlay full-viewport. Sem lógica ainda (Tarefa 1.4).
       ============================================================ */

    #login-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--bg-primary);
      padding: var(--space-6);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-secondary);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      text-align: center;
      transition:
        background var(--transition),
        box-shadow var(--transition);
    }

    .login-logo {
      font-size: 64px;
      line-height: 1;
      margin-bottom: var(--space-2);
    }

    .login-title {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-primary);
    }

    .login-tagline {
      margin: 0 0 var(--space-2) 0;
      font-size: 14px;
      line-height: 1.4;
      color: var(--text-secondary);
    }

    #login-email,
    #login-password {
      width: 100%;
      min-height: 48px;
      padding: var(--space-3) var(--space-4);
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      /* font-size 16px é CRÍTICO: menor que isso o iOS dá zoom no focus */
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition:
        border-color var(--transition),
        box-shadow var(--transition),
        background var(--transition),
        color var(--transition);
    }

    #login-email::placeholder,
    #login-password::placeholder {
      color: var(--text-tertiary);
    }

    #login-email:focus,
    #login-password:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 106, 240, 0.15);
    }

    #login-btn {
      width: 100%;
      min-height: 48px;
      margin-top: var(--space-2);
      background: var(--accent);
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition);
    }

    #login-btn:hover {
      background: var(--accent-hover);
    }

    .login-forgot {
      margin-top: var(--space-2);
      color: var(--text-secondary);
      font-size: 14px;
      text-decoration: none;
      transition: color var(--transition);
    }

    .login-forgot:hover {
      color: var(--accent);
    }

    #login-error {
      margin-top: var(--space-2);
      min-height: 20px;
      color: var(--danger);
      font-size: 14px;
      line-height: 1.4;
    }
  </style>

  <!-- Bootstrap anti-FOUC: aplica a classe light ANTES de pintar -->
  <script>
    (function () {
      if (localStorage.getItem('assistente-theme') === 'light') {
        document.documentElement.classList.add('light');
      }
    })();
  </script>
</head>
<body>
  <button id="theme-toggle" type="button" aria-label="Alternar tema">☀️</button>

  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo" aria-hidden="true">🧠</div>
      <h2 class="login-title">Assistente</h2>
      <p class="login-tagline">Seu sistema operacional pessoal</p>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" onkeydown="if(event.key==='Enter') signIn()">
      <input type="password" id="login-password" placeholder="Senha" autocomplete="current-password" onkeydown="if(event.key==='Enter') signIn()">
      <button id="login-btn" type="button" onclick="signIn()">Entrar</button>
      <a href="#" class="login-forgot">Esqueci minha senha</a>
      <div id="login-error"></div>
    </div>
  </div>

  <h1>Hello World · Assistente</h1>
  <div id="status">Conectando...</div>

  <!-- Toggle de tema (handler do botão + sincroniza ícone) -->
  <script>
    (function () {
      const btn = document.getElementById('theme-toggle');

      function updateIcon() {
        const isLight = document.documentElement.classList.contains('light');
        btn.textContent = isLight ? '🌙' : '☀️';
      }

      btn.addEventListener('click', function () {
        const isLight = document.documentElement.classList.toggle('light');
        localStorage.setItem('assistente-theme', isLight ? 'light' : 'dark');
        updateIcon();
      });

      updateIcon();
    })();
  </script>

  <!-- Supabase SDK (UMD — expõe window.supabase, consumido por js/core/supabase.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>

  <!-- Entry point da aplicação (ES module) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
